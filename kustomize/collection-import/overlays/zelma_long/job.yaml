apiVersion: batch/v1
kind: Job
metadata:
  name: import-zelma-long
spec:
  template:
    spec:
      containers:
      - name: importer
        env:
          - name: COLLECTION_NAME
            value: zelma_long
        volumeMounts:
        - name: import-volume
          mountPath: /data
      volumes:
      - name: import-volume
        persistentVolumeClaim:
          claimName: import-zelma-long-volume-claim