apiVersion: batch/v1
kind: Job
metadata:
  name: import-stockton-diary
spec:
  template:
    spec:
      containers:
      - name: importer
        env:
          - name: COLLECTION_NAME
            value: stockton-diary
        volumeMounts:
        - name: import-volume
          mountPath: /data
      volumes:
      - name: import-volume
        persistentVolumeClaim:
          claimName: import-stockton-diary-volume-claim