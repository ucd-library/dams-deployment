apiVersion: batch/v1
kind: Job
metadata:
  name: import-martin-yan
spec:
  template:
    spec:
      containers:
      - name: importer
        env:
          - name: COLLECTION_NAME
            value: martin-yan
        volumeMounts:
        - name: import-volume
          mountPath: /data
      volumes:
      - name: import-volume
        persistentVolumeClaim:
          claimName: import-martin-yan-volume-claim