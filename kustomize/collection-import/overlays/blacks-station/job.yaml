apiVersion: batch/v1
kind: Job
metadata:
  name: import-blacks-station
spec:
  template:
    spec:
      containers:
      - name: importer
        env:
          - name: COLLECTION_NAME
            value: blacks-station
        volumeMounts:
        - name: import-volume
          mountPath: /data
      volumes:
      - name: import-volume
        persistentVolumeClaim:
          claimName: import-blacks-station-volume-claim