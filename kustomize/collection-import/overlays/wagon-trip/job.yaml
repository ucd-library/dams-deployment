apiVersion: batch/v1
kind: Job
metadata:
  name: import-wagon-trip
spec:
  template:
    spec:
      containers:
      - name: importer
        env:
          - name: COLLECTION_NAME
            value: wagon-trip
        volumeMounts:
        - name: import-volume
          mountPath: /data
      volumes:
      - name: import-volume
        persistentVolumeClaim:
          claimName: import-wagon-trip-volume-claim