apiVersion: batch/v1
kind: Job
metadata:
  name: import-tesla-mine
spec:
  template:
    spec:
      containers:
      - name: importer
        env:
          - name: COLLECTION_NAME
            value: tesla_mine
        volumeMounts:
        - name: import-volume
          mountPath: /data
      volumes:
      - name: import-volume
        persistentVolumeClaim:
          claimName: import-tesla-mine-volume-claim