apiVersion: batch/v1
kind: Job
metadata:
  name: import-gertrude-mcgee
spec:
  template:
    spec:
      containers:
      - name: importer
        env:
          - name: COLLECTION_NAME
            value: gertrude-mcgee
        volumeMounts:
        - name: import-volume
          mountPath: /data
      volumes:
      - name: import-volume
        persistentVolumeClaim:
          claimName: import-gertrude-mcgee-volume-claim