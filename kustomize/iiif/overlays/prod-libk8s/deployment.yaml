apiVersion: apps/v1
kind: Deployment
metadata:
  name: iiif
spec:
  template:
    spec:
      containers:
        - name: service
          image: us-west1-docker.pkg.dev/ucdlib-dams/pub/dams-iipimage-server:2.8.0
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
          envFrom:
            - configMapRef:
                name: dams-env-config
          env:
            - name: GCS_BUCKET
              value: dams-client-media-prod
      nodeSelector:
        intended-for: digital-prod-backend
      volumes:
        - name: gcs-fuse
          persistentVolumeClaim:
            claimName: gcs-fuse-pvc-prod
