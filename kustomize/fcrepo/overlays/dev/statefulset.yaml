apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fcrepo
spec:
  template:
    spec:
      containers:
        - name: service
          image: us-west1-docker.pkg.dev/digital-ucdavis-edu/pub/fin-fcrepo:null
      volumes:
        - name: ocfl-volume
          persistentVolumeClaim:
            claimName: ocfl-volume-claim
      nodeSelector:
        intended-for: digital-dev-backend
  volumeClaimTemplates:
    - metadata:
        name: activemq-volume
      spec:
        storageClassName: microk8s-hostpath
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
