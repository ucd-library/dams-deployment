apiVersion: apps/v1
kind: Deployment
metadata:
  name: ucd-lib-client
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    spec:
      containers:
        - name: service
          image: us-west1-docker.pkg.dev/ucdlib-dams/pub/dams-base-service:2.8.2
          env:
            - name: GA4_ENABLE_STATS
              value: 'true'
            - name: GA4_MEASUREMENT_ID
              value: G-7NK2P5743B
      nodeSelector:
        intended-for: digital-dev-frontend
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: ucd-lib-client
              topologyKey: kubernetes.io/hostname
