apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  template:
    spec:
      containers:
        - name: database
      nodeSelector:
        intended-for: digital-dev-backend
  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      storageClassName: microk8s-hostpath
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 100Mi