apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  template:
    spec:
      nodeSelector:
        intended-for: digital-prod-backend
  volumeClaimTemplates:
    - metadata:
        name: data-volume
      spec:
        storageClassName: microk8s-hostpath
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
